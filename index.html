<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雲端 Helper 出勤紀錄系統</title>
    <!-- 引入 Bootstrap 5 (UI 框架) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .photo-preview { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; border: 2px dashed #ccc; }
        .print-only { display: none; }
        /* 列印與 PDF 匯出專用樣式 */
        @media print {
            body { background-color: white; }
            .no-print { display: none !important; }
            .print-only { display: block; }
            .card { break-inside: avoid; page-break-inside: avoid; box-shadow: none; border: 1px solid #ddd; }
        }
    </style>
</head>
<body>

<div class="container mt-4 no-print">
    <h2 class="text-center mb-4 text-primary">☁️ Helper 出勤紀錄系統 (雲端版)</h2>
    
    <!-- 導航列 -->
    <ul class="nav nav-tabs mb-4" id="myTab" role="tablist">
        <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tab-attendance">打卡出勤</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-employees">員工管理</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-photos">圖片紀錄 (匯出PDF)</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-reports">匯出報告 (CSV)</button></li>
    </ul>

    <div class="tab-content">
        <!-- 【打卡出勤分頁】 -->
        <div class="tab-pane fade show active" id="tab-attendance">
            <div class="card card-body">
                <h4>新增出勤紀錄</h4>
                <form id="attendanceForm">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label>選擇員工</label>
                            <select id="empSelect" class="form-select" required></select>
                        </div>
                        <div class="col-md-6">
                            <label>日期</label>
                            <input type="date" id="workDate" class="form-control" required>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label>開工時間</label>
                            <input type="time" id="startTime" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label>收工時間</label>
                            <input type="time" id="endTime" class="form-control" required>
                        </div>
                    </div>
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="includeLunch">
                        <label class="form-check-label" for="includeLunch">包含午飯時間 (扣除1小時)</label>
                    </div>
                    <div class="row mb-4">
                        <div class="col-md-6">
                            <label>開工打卡照片</label>
                            <input type="file" id="startPhoto" class="form-control mb-2" accept="image/*" required>
                            <img id="startPhotoPreview" class="photo-preview" src="" style="display:none;">
                        </div>
                        <div class="col-md-6">
                            <label>收工打卡照片</label>
                            <input type="file" id="endPhoto" class="form-control mb-2" accept="image/*" required>
                            <img id="endPhotoPreview" class="photo-preview" src="" style="display:none;">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100" id="submitBtn">儲存紀錄並上傳圖片 (請稍候)</button>
                </form>
            </div>
        </div>

        <!-- 【員工管理分頁】 -->
        <div class="tab-pane fade" id="tab-employees">
            <div class="card card-body mb-4">
                <h4>新增員工</h4>
                <form id="employeeForm" class="row g-3">
                    <div class="col-md-3"><input type="text" id="empNickname" class="form-control" placeholder="暱稱 (必填)" required></div>
                    <div class="col-md-3"><input type="text" id="empId" class="form-control" placeholder="工作編號 (必填)" required></div>
                    <div class="col-md-2"><input type="number" id="empWage" class="form-control" placeholder="時薪 ($)" required></div>
                    <div class="col-md-2"><input type="text" id="empName" class="form-control" placeholder="全名 (選填)"></div>
                    <div class="col-md-2"><button type="submit" class="btn btn-success w-100">新增</button></div>
                </form>
            </div>
            <ul class="list-group" id="employeeList"></ul>
        </div>

        <!-- 【圖片紀錄與 PDF 匯出分頁】 -->
        <div class="tab-pane fade" id="tab-photos">
            <div class="card card-body mb-3">
                <div class="row">
                    <div class="col-md-4"><label>員工篩選</label><select id="filterEmpPdf" class="form-select"><option value="ALL">全部員工</option></select></div>
                    <div class="col-md-3"><label>開始日期</label><input type="date" id="filterStartPdf" class="form-control"></div>
                    <div class="col-md-3"><label>結束日期</label><input type="date" id="filterEndPdf" class="form-control"></div>
                    <div class="col-md-2 d-flex align-items-end"><button class="btn btn-danger w-100" onclick="window.print()">列印 / 匯出 PDF</button></div>
                </div>
            </div>
            <div id="photoRecordsContainer" class="row"></div>
        </div>

        <!-- 【匯出報告 (CSV) 分頁】 -->
        <div class="tab-pane fade" id="tab-reports">
            <div class="card card-body mb-3">
                <div class="row">
                    <div class="col-md-10"><label>點擊右側按鈕下載所有紀錄的 Excel(CSV) 檔案</label></div>
                    <div class="col-md-2"><button class="btn btn-success w-100" onclick="exportToCSV()">匯出 CSV</button></div>
                </div>
            </div>
            <div class="table-responsive">
                <table class="table table-striped">
                    <thead><tr><th>日期</th><th>暱稱</th><th>編號</th><th>上班</th><th>下班(更新)</th><th>工時</th><th>總薪金</th></tr></thead>
                    <tbody id="reportTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- 列印專用標題 (只在列印或存 PDF 時顯示) -->
<div class="print-only container mt-4">
    <h2 class="text-center mb-4">員工打卡圖片紀錄報告</h2>
    <div id="printPhotoRecords" class="row"></div>
</div>

<!-- Firebase 核心 SDK (Module 語法) -->
<script type="module">
    // 1. 引入 Firebase 模組
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-storage.js";

    // ⚠️ 請在這裡貼上您在 Firebase Console 獲得的 firebaseConfig
    const firebaseConfig = {
        apiKey: "AIzaSyD7VKVU108qaXHmh8IH3QgxuCupPoA1VB0",
       authDomain: "helper-attendance.firebaseapp.com",
       projectId: "helper-attendance",
      storageBucket: "helper-attendance.firebasestorage.app",
     messagingSenderId: "873836158349",
     appId: "1:873836158349:web:2003832888f09d9651f1c4",
    measurementId: "G-0WY1SZ3DG1"
    };

    // 初始化 Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const storage = getStorage(app);

    let employees = [];
    let records = [];

    // --- 輔助函數：計算工時 (0.5小時倍數調整) ---
    function calculateHours(start, end, lunch) {
        let [sH, sM] = start.split(':').map(Number);
        let [eH, eM] = end.split(':').map(Number);
        
        let endMins = eH * 60 + eM;
        let adjustedEndMins = Math.floor(endMins / 30) * 30; // 往前調整至最近的 30 分鐘
        
        let startMins = sH * 60 + sM;
        let diff = (adjustedEndMins - startMins) / 60;
        if (lunch) diff -= 1;
        
        let adjustedEndStr = `${String(Math.floor(adjustedEndMins/60)).padStart(2,'0')}:${String(adjustedEndMins%60).padStart(2,'0')}`;
        return { hours: Math.max(0, diff), adjustedEnd: adjustedEndStr };
    }

    // --- 員工管理功能 ---
    document.getElementById('employeeForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const emp = {
            nickname: document.getElementById('empNickname').value,
            empId: document.getElementById('empId').value,
            wage: Number(document.getElementById('empWage').value),
            name: document.getElementById('empName').value
        };
        await addDoc(collection(db, "employees"), emp);
        document.getElementById('employeeForm').reset();
        alert('員工新增成功！');
        loadEmployees();
    });

    async function loadEmployees() {
        const querySnapshot = await getDocs(collection(db, "employees"));
        employees = [];
        const list = document.getElementById('employeeList');
        const select = document.getElementById('empSelect');
        const filterPdf = document.getElementById('filterEmpPdf');
        list.innerHTML = ''; select.innerHTML = ''; filterPdf.innerHTML = '<option value="ALL">全部員工</option>';

        querySnapshot.forEach((docSnap) => {
            const data = docSnap.data();
            data.uid = docSnap.id;
            employees.push(data);
            
            list.innerHTML += `<li class="list-group-item d-flex justify-content-between">
                <span>[${data.empId}] ${data.nickname} - 時薪 $${data.wage}</span>
                <button class="btn btn-sm btn-danger" onclick="window.deleteEmp('${data.uid}')">刪除</button>
            </li>`;
            
            let opt = `<option value="${data.empId}">${data.nickname} (${data.empId})</option>`;
            select.innerHTML += opt;
            filterPdf.innerHTML += opt;
        });
    }
    
    // 將刪除功能掛載到全域
    window.deleteEmp = async (uid) => {
        if(confirm('確定要刪除嗎？')) {
            await deleteDoc(doc(db, "employees", uid));
            loadEmployees();
        }
    }

    // --- 出勤打卡與圖片上傳功能 ---
    // 照片預覽邏輯
    ['startPhoto', 'endPhoto'].forEach(id => {
        document.getElementById(id).addEventListener('change', function(e) {
            const file = e.target.files[0];
            if(file) {
                const img = document.getElementById(id + 'Preview');
                img.src = URL.createObjectURL(file);
                img.style.display = 'block';
            }
        });
    });

    document.getElementById('attendanceForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true; btn.innerText = "上傳圖片與資料中，請稍候...";

        try {
            const empId = document.getElementById('empSelect').value;
            const emp = employees.find(e => e.empId === empId);
            const date = document.getElementById('workDate').value;
            const start = document.getElementById('startTime').value;
            const end = document.getElementById('endTime').value;
            const lunch = document.getElementById('includeLunch').checked;

            const calc = calculateHours(start, end, lunch);
            const totalPay = calc.hours * emp.wage;

            // 上傳圖片到 Firebase Storage 並獲取網址
            const startFile = document.getElementById('startPhoto').files[0];
            const endFile = document.getElementById('endPhoto').files[0];

            // 命名規則：員工編號_日期_時間戳.jpg
            const startRef = ref(storage, `attendance/${empId}_${date}_start_${Date.now()}`);
            const endRef = ref(storage, `attendance/${empId}_${date}_end_${Date.now()}`);

            await uploadBytes(startRef, startFile);
            const startUrl = await getDownloadURL(startRef);

            await uploadBytes(endRef, endFile);
            const endUrl = await getDownloadURL(endRef);

            // 儲存文字資料到 Firestore
            const recordData = {
                empId: emp.empId,
                nickname: emp.nickname,
                wage: emp.wage,
                date: date,
                startTime: start,
                endTime: end,
                adjustedEndTime: calc.adjustedEnd,
                lunch: lunch,
                hours: calc.hours,
                totalPay: totalPay,
                startPhotoUrl: startUrl,
                endPhotoUrl: endUrl,
                timestamp: Date.now()
            };

            await addDoc(collection(db, "attendance"), recordData);
            alert(`打卡成功！\n結算工時：${calc.hours} 小時\n總薪金：$${totalPay}`);
            document.getElementById('attendanceForm').reset();
            document.querySelectorAll('.photo-preview').forEach(img => img.style.display = 'none');
            loadRecords();
        } catch (error) {
            console.error(error);
            alert("上傳失敗，請檢查網路或 Firebase 權限設定！");
        } finally {
            btn.disabled = false; btn.innerText = "儲存紀錄並上傳圖片";
        }
    });

    // --- 載入與渲染報表 / 圖片 PDF 區塊 ---
    async function loadRecords() {
        const q = query(collection(db, "attendance"), orderBy("timestamp", "desc"));
        const querySnapshot = await getDocs(q);
        records = [];
        querySnapshot.forEach(doc => records.push(doc.data()));
        renderReports();
        renderPhotoCards();
    }

    function renderReports() {
        const tbody = document.getElementById('reportTableBody');
        tbody.innerHTML = '';
        records.forEach(r => {
            tbody.innerHTML += `<tr>
                <td>${r.date}</td><td>${r.nickname}</td><td>${r.empId}</td>
                <td>${r.startTime}</td><td>${r.endTime} ➔ <b class="text-danger">${r.adjustedEndTime}</b></td>
                <td>${r.hours} 小時 ${r.lunch ? '(含午飯)' : ''}</td><td>$${r.totalPay}</td>
            </tr>`;
        });
    }

    function renderPhotoCards() {
        const container = document.getElementById('photoRecordsContainer');
        const printContainer = document.getElementById('printPhotoRecords');
        let html = '';
        
        // 可依據篩選條件過濾
        const filterEmp = document.getElementById('filterEmpPdf').value;
        const filteredRecords = records.filter(r => filterEmp === 'ALL' || r.empId === filterEmp);

        filteredRecords.forEach(r => {
            html += `
            <div class="col-md-6 mb-4">
                <div class="card p-3">
                    <h5 class="border-bottom pb-2">👤 ${r.nickname} (編號: ${r.empId}) | 📅 ${r.date}</h5>
                    <p class="mb-1"><b>時間：</b> ${r.startTime} - ${r.adjustedEndTime} (工時: ${r.hours}h)</p>
                    <p class="mb-2"><b>薪金：</b> $${r.totalPay}</p>
                    <div class="row">
                        <div class="col-6 text-center">
                            <span class="badge bg-primary mb-1">開工打卡</span>
                            <img src="${r.startPhotoUrl}" class="img-fluid rounded border" style="height: 150px; object-fit: cover;">
                        </div>
                        <div class="col-6 text-center">
                            <span class="badge bg-danger mb-1">收工打卡</span>
                            <img src="${r.endPhotoUrl}" class="img-fluid rounded border" style="height: 150px; object-fit: cover;">
                        </div>
                    </div>
                </div>
            </div>`;
        });
        container.innerHTML = html;
        printContainer.innerHTML = html; // 同步到隱藏的列印區塊
    }

    // 監聽 PDF 篩選條件變動
    document.getElementById('filterEmpPdf').addEventListener('change', renderPhotoCards);

    // CSV 匯出功能掛載到全域
    window.exportToCSV = () => {
        let csvContent = "data:text/csv;charset=utf-8,\uFEFF"; // 支援中文的 BOM
        csvContent += "日期,暱稱,工作編號,原始上班,原始下班,更新後下班,包午飯(扣1hr),總工時,時薪,總薪金\n";
        
        records.forEach(r => {
            let row = `${r.date},${r.nickname},${r.empId},${r.startTime},${r.endTime},${r.adjustedEndTime},${r.lunch?"是":"否"},${r.hours},${r.wage},${r.totalPay}`;
            csvContent += row + "\n";
        });

        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", `出勤紀錄報告_${new Date().toISOString().split('T')[0]}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    };

    // 初始化載入
    window.onload = async () => {
        // 設定今天的預設日期
        document.getElementById('workDate').value = new Date().toISOString().split('T')[0];
        await loadEmployees();
        await loadRecords();
    };
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
